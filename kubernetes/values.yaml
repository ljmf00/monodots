searxng-redis:
  fullnameOverride: searxng-redis

  # FIXME: fix architecture with replication enabled
  #architecture: replication
  architecture: standalone

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

  auth:
    enabled: false

  # no need to for persistence for cache nodes
  master:
    annotations:
      descheduler.alpha.kubernetes.io/evict: "false"
    persistence:
      enabled: true

wireguard:
  daemonSet: true

  autoscaling:
    minReplicas: 1
    maxReplicas: 2

  useHostPort: true
  hostPort: 51822
  service:
    type: ClusterIP
    port: 51822
    ipFamilyPolicy: PreferDualStack

  nodeSelector:
    node-role.kubernetes.io/gateway: "true"

  # secretName: monodots-wg-privkey
  wireguard:
    clients:
    - AllowedIPs: "10.34.0.2/32"
      PublicKey: "rrNHUE1vmRIi1JP5DR8A792jsqtv+vJbGoqZuxX6gHE="
      PersistentKeepalive: 25
    serverAddress: "10.34.0.1/24"
    serverCidr: "10.34.0.0/24"
    forwardIPv6: true

searxng:
  controller:
    # TODO: increase number of replicas when more nodes are available
    replicas: 5

    dnsPolicy: None
    dnsConfig:
      nameservers:
        - 8.8.8.8
        - 1.1.1.1
      searches:
        - cluster.local

  persistence:
    limiter:
      enabled: false
      type: configMap
      name: configmap-searxng-limiter
      mountPath: /etc/searxng/limiter.toml
      subPath: limiter.toml

  searxng:
    config:
      use_default_settings: true

      ui:
        static_use_hash: true
        query_in_title: true
        infinite_scroll: true

        theme_args:
          simple_style: dark

      server:
        image_proxy: true
        limiter: false
        method: "GET"

      general:
        debug: false

      preferences:
        lock:
          - autocomplete
          - favicon
          - doi_resolver

      outgoing:
        request_timeout: 3.0
        max_request_timeout: 9.0

        pool_connections: 100
        pool_maxsize: 10

      search:
        autocomplete: "google"
        favicon_resolver: "duckduckgo"
        default_lang: "all"

        formats:
          - html
          # - json
          # - csv
          # - rss

      plugins:
        searx.plugins.calculator.SXNGPlugin:
          active: true

        searx.plugins.hash_plugin.SXNGPlugin:
          active: true

        searx.plugins.self_info.SXNGPlugin:
          active: true

        searx.plugins.unit_converter.SXNGPlugin:
          active: true

        searx.plugins.ahmia_filter.SXNGPlugin:
          active: true

        searx.plugins.hostnames.SXNGPlugin:
          active: true

        searx.plugins.time_zone.SXNGPlugin:
          active: true

        searx.plugins.oa_doi_rewrite.SXNGPlugin:
          active: true

        searx.plugins.tor_check.SXNGPlugin:
          active: true

        searx.plugins.tracker_url_remover.SXNGPlugin:
          active: true

  env:
    BASE_URL: "https://search.lsferreira.net/"
    AUTOCOMPLETE: "true"
    TZ: "Europe/Lisbon"
    GENERATION: "613baadb-fa50-4a7e-83e9-0f3ff2850617"

rss-bridge:
  global:
    nameOverride: rss-bridge
  controllers:
    main:
      replicas: 5
      type: deployment
      strategy: RollingUpdate
      rollingUpdate:
        unavailable: 1
      containers:
        main:
          image:
            repository: ghcr.io/rss-bridge/rss-bridge
            tag: latest
            pullPolicy: Always

          env: {}
  service:
    main:
      controller: main
      type: ClusterIP
      ports:
        http:
          port: 80

