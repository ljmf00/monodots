apiVersion: v1
kind: ConfigMap
metadata:
  name: configmap-searxng-settings
  labels:
    app.kubernetes.io/name: searxng
    app.kubernetes.io/component: config
data:
  settings.yml: |
    use_default_settings: true
    server:
      image_proxy: true
      limiter: true
      method: "GET"
    general:
      debug: false
    search:
      autocomplete: "google"
      favicon_resolver: "duckduckgo"
      default_lang: "all"
      formats: ["html"]
    ui:
      static_use_hash: true
      query_in_title: true
      infinite_scroll: true
      theme_args:
        simple_style: dark
    preferences:
      lock: ["autocomplete", "favicon", "doi_resolver"]
    outgoing:
      request_timeout: 3.0
      max_request_timeout: 9.0
      pool_connections: 100
      pool_maxsize: 10
    enabled_plugins:
      - "Calculator"
      - "Hash plugin"
      - "Self Information"
      - "Unit converter"
      - "Ahmia blacklist"
      - "Hostnames"
      - "Time zone"
      - "Open Access DOI rewrite"
      - "Tor check plugin"
      - "Tracker URL remover"
