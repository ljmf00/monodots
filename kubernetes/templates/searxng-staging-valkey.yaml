apiVersion: v1
kind: Service
metadata:
  name: monodots-searxng-staging-valkey
  labels:
    app.kubernetes.io/name: searxng-staging-valkey
    app.kubernetes.io/instance: searxng-staging
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    app.kubernetes.io/name: searxng-staging-valkey
    app.kubernetes.io/instance: searxng-staging
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: monodots-searxng-staging-valkey
  labels:
    app.kubernetes.io/name: searxng-staging-valkey
    app.kubernetes.io/instance: searxng-staging
    app.kubernetes.io/component: cache
spec:
  serviceName: monodots-searxng-staging-valkey
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: searxng-staging-valkey
      app.kubernetes.io/instance: searxng-staging
  template:
    metadata:
      labels:
        app.kubernetes.io/name: searxng-staging-valkey
        app.kubernetes.io/instance: searxng-staging
        app.kubernetes.io/component: cache
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: valkey
          image: docker.io/valkey/valkey:9-alpine
          imagePullPolicy: IfNotPresent
          command: ["valkey-server", "--save", "30", "1", "--loglevel", "warning"]
          ports:
            - name: valkey
              containerPort: 6379
              protocol: TCP
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 1000
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: valkey-staging-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: valkey-staging-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
